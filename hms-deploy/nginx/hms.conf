# =============================================================================
# Nginx configuration for HMS
# Install: cp hms.conf /etc/nginx/sites-available/hms
#          ln -s /etc/nginx/sites-available/hms /etc/nginx/sites-enabled/hms
#          nginx -t && systemctl reload nginx
# =============================================================================

limit_req_zone $binary_remote_addr zone=hms_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=hms_api:10m   rate=120r/m;

upstream hms_backend {
    server unix:/run/hms/gunicorn.sock fail_timeout=0;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;
    server_tokens off;

    # TLS
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-Frame-Options           "DENY"          always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    client_max_body_size 26M;
    client_body_timeout  30s;

    access_log /var/log/nginx/hms_access.log;
    error_log  /var/log/nginx/hms_error.log warn;

    # Django admin — IP-restrict in production
    location /admin/ {
        # allow 10.0.0.0/8;   # VPN/office CIDR
        # deny all;
        proxy_pass http://hms_backend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login endpoint — strict rate limit
    location /api/v1/auth/login/ {
        limit_req zone=hms_login burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://hms_backend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        limit_req zone=hms_api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://hms_backend;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Static files
    location /static/ {
        alias /var/www/hms/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # Health check
    location /health/ {
        access_log off;
        proxy_pass http://hms_backend;
        proxy_set_header Host $http_host;
    }

    # Block sensitive paths
    location ~ /\.(git|env|htaccess) { deny all; return 404; }
    location = /favicon.ico { access_log off; log_not_found off; }
}
