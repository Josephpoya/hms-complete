# PostgreSQL 16 production configuration for HMS
# Adjust shared_buffers and effective_cache_size based on available RAM.

# Connection settings
max_connections = 100          # PgBouncer sits in front; real limit is lower
superuser_reserved_connections = 3

# Memory
shared_buffers       = 256MB   # 25% of available RAM (set by env/entrypoint)
work_mem             = 4MB     # Per sort/hash operation; multiply by max_connections
maintenance_work_mem = 64MB    # For VACUUM, CREATE INDEX
effective_cache_size = 768MB   # 75% of RAM — helps query planner, doesn't allocate

# WAL (Write-Ahead Log)
wal_level            = replica  # Required for logical/physical replication
archive_mode         = off      # Turn on when adding a replica
wal_compression      = on
checkpoint_completion_target = 0.9
max_wal_size         = 1GB
min_wal_size         = 80MB

# Query planner
random_page_cost     = 1.1     # For SSD storage; default 4.0 is for spinning disk
effective_io_concurrency = 200 # Number of simultaneous I/O requests (SSD)
default_statistics_target = 100

# Logging
log_min_duration_statement = 500  # Log queries > 500ms
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,client=%h '
log_checkpoints = on
log_lock_waits  = on
log_temp_files  = 10MB

# Autovacuum — keep tables clean; critical for write-heavy HMS workloads
autovacuum = on
autovacuum_max_workers     = 3
autovacuum_naptime         = 30s
autovacuum_vacuum_scale_factor   = 0.05
autovacuum_analyze_scale_factor  = 0.025
