# =============================================================================
# HMS Enterprise Docker Compose — Production Stack
# =============================================================================
#
# Services:
#   db          PostgreSQL 16 with WAL archiving and connection limits
#   pgbouncer   Connection pooler — keeps DB connections at manageable levels
#   redis       Redis 7 with persistence + LRU eviction
#   app         Django/Gunicorn — 2 replicas, rolling deploy
#   celery      Async task workers — scalable independently
#   celerybeat  Periodic scheduler — always exactly 1 instance
#   nginx       TLS termination, rate limiting, static file serving
#
# Quick start:
#   cp .env.example .env.production
#   docker compose --env-file .env.production up -d
#
# Scale workers:
#   docker compose --env-file .env.production up -d --scale celery=4
# =============================================================================

networks:
  hms_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-hms_db}
      POSTGRES_USER:     ${DB_USER:-hms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - hms_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hms_user} -d ${DB_NAME:-hms_db}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

  # ── PgBouncer connection pooler ─────────────────────────────────────────────
  # Without PgBouncer: each of 8 Gunicorn threads holds a persistent connection.
  # With PgBouncer: 8 threads share a pool of 5 actual DB connections.
  # This keeps PostgreSQL's max_connections free for administrative queries.
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    restart: unless-stopped
    environment:
      DB_HOST:            db
      DB_PORT:            "5432"
      DB_USER:            ${DB_USER:-hms_user}
      DB_PASSWORD:        ${DB_PASSWORD}
      DB_NAME:            ${DB_NAME:-hms_db}
      POOL_MODE:          transaction
      MAX_CLIENT_CONN:    "200"
      DEFAULT_POOL_SIZE:  "20"
      MIN_POOL_SIZE:      "5"
      SERVER_IDLE_TIMEOUT: "30"
      AUTH_TYPE:          md5
    networks:
      - hms_internal
    depends_on:
      db:
        condition: service_healthy

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - hms_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  3

  # ── Django / Gunicorn app ───────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL:          postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL:     redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - static_files:/var/www/hms/staticfiles
      - media_files:/var/www/hms/media
    networks:
      - hms_internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ | python3 -c \"import sys,json; d=json.load(sys.stdin); sys.exit(0 if d['status']=='healthy' else 1)\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 60s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    restart: unless-stopped
    command: >
      celery --app config worker
      --loglevel=info
      --concurrency=2
      --queues=default,notifications,reports,critical
      --max-tasks-per-child=200
      --without-gossip
      --without-mingle
    env_file: .env.production
    environment:
      DATABASE_URL:          postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      REDIS_URL:             redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL:     redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    networks:
      - hms_internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat — SINGLE INSTANCE, NEVER SCALE ──────────────────────────────
  celerybeat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    restart: unless-stopped
    command: >
      celery --app config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --pidfile=/tmp/celerybeat.pid
    env_file: .env.production
    environment:
      DATABASE_URL:      postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:5432/${DB_NAME}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    networks:
      - hms_internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/hms.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/hms/staticfiles:ro
      - media_files:/var/www/hms/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - hms_internal
    depends_on:
      app:
        condition: service_healthy
